<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NEON DROP ULTRA</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:
radial-gradient(circle at top,#311060,#090014 70%);
color:white;
min-height:100vh;
overflow-x:hidden;
padding-bottom:120px;
}

.app{
max-width:430px;
margin:auto;
padding:20px 16px 40px;
}

.logo{
text-align:center;
margin-top:30px;
}

.logo img{
width:120px;
filter:drop-shadow(0 0 25px #00e5ff);
}

.title{
font-size:58px;
font-weight:bold;
line-height:0.95;
margin-top:10px;
text-shadow:0 0 20px #ff00ff;
}

.title span{
color:#ffd54a;
}

.subtitle{
margin-top:14px;
font-size:18px;
opacity:0.9;
}

.main-btn{
width:100%;
height:74px;
border:none;
border-radius:26px;
margin-top:22px;
font-size:32px;
font-weight:bold;
color:white;
background:
linear-gradient(90deg,#ff00ff,#00d4ff);
box-shadow:
0 0 25px #ff00ff88,
0 0 35px #00d4ff55;
}

.card{
margin-top:80px;
padding:22px;
border-radius:28px;
background:
linear-gradient(180deg,#1a0938,#120020);
border:2px solid #00d4ff55;
box-shadow:0 0 25px #00d4ff22;
margin-bottom:120px;
}

.card-title{
font-size:34px;
font-weight:bold;
text-align:center;
margin-bottom:18px;
}

.grid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:6px;
margin-top:18px;
}

.block{
aspect-ratio:1;
border-radius:10px;
box-shadow:0 0 15px currentColor;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{
transform:scale(1);
}
to{
transform:scale(1.08);
}
}

.c1{background:#00e5ff;color:#00e5ff;}
.c2{background:#ff00ff;color:#ff00ff;}
.c3{background:#ffee58;color:#ffee58;}
.c4{background:#69f0ae;color:#69f0ae;}
.c5{background:#7c4dff;color:#7c4dff;}
.c6{background:#ff5252;color:#ff5252;}

.bottom-nav{
width:95%;
max-width:420px;
height:110px;
margin:60px auto 40px;
border-radius:24px;
background:#070014ee;
display:flex;
justify-content:space-around;
align-items:center;
backdrop-filter:blur(12px);
border:1px solid #00d4ff44;
padding-bottom:10px;
}

.nav-btn{
text-align:center;
font-size:16px;
font-weight:bold;
color:white;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

height:80px;
gap:4px;
}

.nav-btn div{
font-size:32px;
margin-bottom:0px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:10px;
margin-bottom:20px;
}

.gems{
padding:10px 18px;
border-radius:999px;
background:#120022;
border:1px solid #ff00ff55;
box-shadow:0 0 15px #ff00ff33;
font-weight:bold;
}

.energy{
padding:10px 18px;
border-radius:999px;
background:#001b2a;
border:1px solid #00d4ff55;
box-shadow:0 0 15px #00d4ff33;
font-weight:bold;
}

</style>
</head>

<body>

<div class="app">

<div class="topbar">

<div class="gems">
💎 12,345
</div>

<div class="energy">
⚡ 5 / 5
</div>

</div>

<div class="logo">

<div style="font-size:110px;">💎</div>

<div class="title">
NEON<br>
DROP<br>
<span>ULTRA</span>
</div>

<div class="subtitle">
落として、そろえて、超爽快。
</div>

</div>

<button class="main-btn" onclick="startGame()">
▶ ゲームスタート
</button>

<button class="main-btn" onclick="openRanking()">
🏆 ランキング
</button>

<button class="main-btn" onclick="location.href='gacha.html'"
🎰 ガチャ
</button>

<div class="card">

<div class="card-title">
PLAY FIELD
</div>

<div class="grid">

<div class="block c1"></div>
<div class="block c2"></div>
<div class="block c3"></div>
<div class="block c4"></div>
<div class="block c5"></div>
<div class="block c1"></div>

<div class="block c6"></div>
<div class="block c3"></div>
<div class="block c2"></div>
<div class="block c5"></div>
<div class="block c4"></div>
<div class="block c6"></div>

<div class="block c1"></div>
<div class="block c4"></div>
<div class="block c5"></div>
<div class="block c3"></div>
<div class="block c2"></div>
<div class="block c1"></div>

<div class="block c6"></div>
<div class="block c2"></div>
<div class="block c3"></div>
<div class="block c1"></div>
<div class="block c4"></div>
<div class="block c5"></div>

</div>

</div>

</div>

<div class="bottom-nav">

<div class="nav-btn" onclick="location.href='gacha.html'">
<div>🏠</div>
ホーム
</div>

<div class="nav-btn">
<div>🎮</div>
プレイ
</div>

<div class="nav-btn" onclick="location.href='gacha.html'">

<div style="font-size:32px;">🎰</div>

<div style="font-size:16px; color:white; font-weight:bold;">
ガチャ
</div>

</div>

<div class="nav-btn">
<div>🏆</div>
ランク
</div>

<script>

function startGame(){
window.location.href = "game.html";
}

function openRanking(){
alert("ランキング！");
}

function openGacha(){
alert("ガチャ！");
}

</script>

</body>
</html>
