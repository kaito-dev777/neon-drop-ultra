<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON DROP ULTRA - GACHA</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:
radial-gradient(circle at top,#2d0059,#070014 70%);
color:white;
overflow-y:auto;
min-height:100vh;
height:auto;
padding-bottom:120px;
}

.app{
max-width:430px;
margin:auto;
padding:20px 16px 500px;
text-align:center;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.back{
border:none;
border-radius:14px;
padding:10px 18px;
background:#101827;
color:white;
font-weight:bold;
}

.gems{
padding:10px 18px;
border-radius:999px;
background:#180028;
border:1px solid #ff00ff55;
box-shadow:0 0 20px #ff00ff33;
font-weight:bold;
}

.title{
font-size:52px;
font-weight:bold;
line-height:0.95;
text-shadow:
0 0 20px #ff00ff,
0 0 30px #00d4ff;
margin-top:10px;
}

.subtitle{
margin-top:12px;
font-size:18px;
opacity:0.9;
}

.machine{
margin-top:40px;
height:300px;
border-radius:36px;
background:
linear-gradient(180deg,#1a0938,#120020);
border:2px solid #00d4ff55;
display:flex;
align-items:center;
justify-content:center;
position:relative;
overflow-y:auto;
box-shadow:
0 0 35px #00d4ff22,
0 0 55px #ff00ff11;
}

.core{
width:160px;
height:160px;
border-radius:50%;
background:
radial-gradient(circle,#ffffff,#00d4ff,#ff00ff);
animation:spin 4s linear infinite;
box-shadow:
0 0 30px #00d4ff,
0 0 60px #ff00ff;
}

@keyframes spin{
from{
transform:rotate(0deg);
}
to{
transform:rotate(360deg);
}
}

.flash{
position:absolute;
inset:0;
background:white;
opacity:0;
pointer-events:none;
}

.flash.active{
animation:flash 0.5s;
}

@keyframes flash{
0%{opacity:0;}
50%{opacity:0.9;}
100%{opacity:0;}
}

.gacha-btn{
width:100%;
height:80px;
border:none;
border-radius:28px;
margin-top:30px;
font-size:30px;
font-weight:bold;
color:white;
background:
linear-gradient(90deg,#ff00ff,#00d4ff);
box-shadow:
0 0 30px #ff00ff88,
0 0 40px #00d4ff55;
}

.result{
margin-top:30px;
padding:24px;
border-radius:28px;
background:
linear-gradient(180deg,#190028,#0b0018);
border:2px solid #ff00ff55;
min-height:140px;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
box-shadow:0 0 25px #ff00ff22;
}

.result-rank{
font-size:54px;
font-weight:bold;
text-shadow:0 0 25px currentColor;
}

.result-name{
margin-top:10px;
font-size:26px;
font-weight:bold;
}

.ssr{
color:#ffd54a;
}

.sr{
color:#00e5ff;
}

.r{
color:#ffffff;
}

.bottom-nav{
position:fixed;
bottom:18px;
width:95%;
max-width:420px;
height:82px;
border-radius:28px;
background:#070014ee;
display:flex;
justify-content:space-around;
align-items:center;
backdrop-filter:blur(12px);
border:1px solid #00d4ff44;
}

.nav-btn{
text-align:center;
font-size:14px;
color:white;
}

.nav-btn div{
font-size:32px;
margin-bottom:4px;
}

@keyframes pop{
0%{
transform:scale(0.3);
opacity:0;
}

100%{
transform:scale(1);
opacity:1;
}
}
@keyframes rainbowFlash{

0%{
filter:hue-rotate(0deg);
transform:scale(1);
}

50%{
filter:hue-rotate(180deg);
transform:scale(1.05);
}

100%{
filter:hue-rotate(360deg);
transform:scale(1);
}

}

@keyframes shake{

0%{transform:translateX(0);}
25%{transform:translateX(-6px);}
50%{transform:translateX(6px);}
75%{transform:translateX(-6px);}
100%{transform:translateX(0);}

}

#slotArea{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
}

.slot{
width:90px;
height:90px;
border-radius:20px;
background:#120022;
border:3px solid cyan;
display:flex;
justify-content:center;
align-items:center;
font-size:34px;
font-weight:bold;
box-shadow:0 0 20px cyan;
animation:slotGlow 1s infinite alternate;
}

@keyframes slotGlow{
0%{
transform:scale(1);
}
100%{
transform:scale(1.08);
}
}

0%{transform:translateX(0);}
25%{transform:translateX(-6px);}
50%{transform:translateX(6px);}
75%{transform:translateX(-6px);}
100%{transform:translateX(0);}

}
</style>
</head>

<body>

<div class="app">

<div class="topbar">

<button class="back" onclick="location.href='index.html'">
← ホーム
</button>

<div class="gems">
💎 12,345
</div>

</div>

<div class="title">
NEON<br>
GACHA
</div>

<div class="subtitle">
SSR確率 3%
</div>

<div class="machine">

<div class="core"></div>

<div class="flash" id="flash"></div>

</div>

<button class="gacha-btn" onclick="pullGacha()">
🎰 ガチャを引く
</button>

<div id="slotArea">

<div class="slot" id="slot1">?</div>
<div class="slot" id="slot2">?</div>
<div class="slot" id="slot3">?</div>

</div>

<div class="result" id="result">

<div class="result-rank">
READY
</div>

<div class="result-name">
超レアを狙え🔥
</div>

</div>

</div>

<div class="bottom-nav">

<div class="nav-btn" onclick="location.href='index.html'">
<div>🏠</div>
ホーム
</div>

<div class="nav-btn" onclick="location.href='game.html'">
<div>🎮</div>
プレイ
</div>

<div class="nav-btn" onclick="location.href='gacha.html'">
<div>🎰</div>
ガチャ
</div>

<div class="nav-btn">
<div>🏆</div>
ランク
</div>

</div>

<script>

function pullGacha(){

const flash = document.getElementById("flash");
const result = document.getElementById("result");

document.body.style.animation = "";
result.style.animation = "";

flash.classList.add("active");

setTimeout(()=>{
flash.classList.remove("active");
},500);

const slot1 = document.getElementById("slot1");
const slot2 = document.getElementById("slot2");
const slot3 = document.getElementById("slot3");

const marks = ["7","★","◆","⚡","👑"];

let spin = setInterval(()=>{

slot1.innerHTML =
marks[Math.floor(Math.random()*marks.length)];

slot2.innerHTML =
marks[Math.floor(Math.random()*marks.length)];

slot3.innerHTML =
marks[Math.floor(Math.random()*marks.length)];

},100);

setTimeout(()=>{

clearInterval(spin);

const rand = Math.random();

if(rand < 0.03){

slot1.innerHTML = "SSR";
slot2.innerHTML = "SSR";
slot3.innerHTML = "SSR";

}
else if(rand < 0.20){

slot1.innerHTML = "SR";
slot2.innerHTML = "SR";
slot3.innerHTML = "SR";

}
else{

slot1.innerHTML = "R";
slot2.innerHTML = "R";
slot3.innerHTML = "R";

}

},1500);
