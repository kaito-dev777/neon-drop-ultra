<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON DROP ULTRA - GACHA</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:
radial-gradient(circle at top,#2d0059,#070014 70%);
color:white;
overflow-y:auto;
min-height:100vh;
height:auto;
padding-bottom:120px;
}

.app{
max-width:430px;
margin:auto;
padding:20px 16px 500px;
text-align:center;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.back{
border:none;
border-radius:14px;
padding:10px 18px;
background:#101827;
color:white;
font-weight:bold;
}

.gems{
padding:10px 18px;
border-radius:999px;
background:#180028;
border:1px solid #ff00ff55;
box-shadow:0 0 20px #ff00ff33;
font-weight:bold;
}

.title{
font-size:52px;
font-weight:bold;
line-height:0.95;
text-shadow:
0 0 20px #ff00ff,
0 0 30px #00d4ff;
margin-top:10px;
}

.subtitle{
margin-top:12px;
font-size:18px;
opacity:0.9;
}

.machine{
margin-top:40px;
height:300px;
border-radius:36px;
background:
linear-gradient(180deg,#1a0938,#120020);
border:2px solid #00d4ff55;
display:flex;
align-items:center;
justify-content:center;
position:relative;
overflow-y:auto;
box-shadow:
0 0 35px #00d4ff22,
0 0 55px #ff00ff11;
}

@keyframes spin{
from{
transform:rotate(0deg);
}
to{
transform:rotate(360deg);
}
}

.flash{
position:absolute;
inset:0;
background:white;
opacity:0;
pointer-events:none;
}

.flash.active{
animation:flash 0.5s;
}

@keyframes flash{
0%{opacity:0;}
50%{opacity:0.9;}
100%{opacity:0;}
}

.gacha-btn{

display:block;

width:100%;
height:80px;
border:none;
border-radius:28px;
margin-top:30px;
font-size:30px;
font-weight:bold;
color:white;
background:
linear-gradient(90deg,#ff00ff,#00d4ff);
box-shadow:
0 0 30px #ff00ff88,
0 0 40px #00d4ff55;
}

.ten-btn{
margin-top:20px;
}

#tenResult{
display:grid;
grid-template-columns:repeat(3,80px);
justify-content:center;
gap:10px;
margin-top:30px;
}

#tenResult .slot{
width:80px;
height:80px;
font-size:16px;
margin:auto;
}

.result{
margin-top:30px;
padding:24px;
border-radius:28px;
background:
linear-gradient(180deg,#190028,#0b0018);
border:2px solid #ff00ff55;
min-height:140px;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
box-shadow:0 0 25px #ff00ff22;
}

.result-rank{
font-size:54px;
font-weight:bold;
text-shadow:0 0 25px currentColor;
}

.result-name{
margin-top:10px;
font-size:26px;
font-weight:bold;
}

.ssr{
color:#ffd54a;
background:linear-gradient(180deg,#3a2500,#120800);
border:2px solid gold;
box-shadow:
0 0 15px #ffd700,
0 0 30px #ffae00;
}

.ssr img{
box-shadow:
0 0 20px gold;
}

.sr{
color:#00e5ff;
}

.r{
color:#ffffff;
}

.bottom-nav{
position:fixed;
bottom:18px;
width:95%;
max-width:420px;
height:82px;
border-radius:28px;
background:#070014ee;
display:flex;
justify-content:space-around;
align-items:center;
backdrop-filter:blur(12px);
border:1px solid #00d4ff44;
}

.nav-btn{
text-align:center;
font-size:14px;
color:white;
}

.nav-btn div{
font-size:32px;
margin-bottom:4px;
}

@keyframes pop{
0%{
transform:scale(0.3);
opacity:0;
}

100%{
transform:scale(1);
opacity:1;
}
}
@keyframes rainbowFlash{

0%{
background:#ff0000;
}

25%{
background:#00ffee;
}

50%{
background:#ff00ff;
}

75%{
background:#ffee00;
}

100%{
background:#ff0000;
}

}

@keyframes shake{

0%{transform:translateX(0);}
25%{transform:translateX(-6px);}
50%{transform:translateX(6px);}
75%{transform:translateX(-6px);}
100%{transform:translateX(0);}

}

#slotArea{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
}

.slot{
width:90px;
height:90px;
border-radius:20px;
background:#120022;
display:flex;
justify-content:center;
align-items:center;
font-size:34px;
font-weight:bold;
animation:slotGlow 1s infinite alternate;
overflow:hidden;
}

.r{
border:3px solid cyan;
box-shadow:0 0 20px cyan;
}

.sr{
border:3px solid #ff3b3b;
box-shadow:0 0 20px #ff3b3b;
}

.ssr{
border:3px solid gold;
box-shadow:
0 0 20px gold,
0 0 40px #ffcc00;
}

@keyframes cardOpen{
0%{
transform:rotateY(0deg);
}
50%{
transform:rotateY(90deg);
}
100%{
transform:rotateY(0deg);
}
}

.opening{
animation:cardOpen 0.5s ease;
}

.slot{
opacity:0;
animation-fill-mode:forwards;
}

.show1{animation-delay:0.1s;}
.show2{animation-delay:0.2s;}
.show3{animation-delay:0.3s;}
.show4{animation-delay:0.4s;}
.show5{animation-delay:0.5s;}
.show6{animation-delay:0.6s;}
.show7{animation-delay:0.7s;}
.show8{animation-delay:0.8s;}
.show9{animation-delay:0.9s;}
.show10{animation-delay:1s;}

.slot img{
width:100%;
height:100%;
object-fit:cover;
object-position:center 20%;
}

@keyframes goldFlash{
0%{
background:#120022;
}
50%{
background:#3a2500;
box-shadow:0 0 40px gold;
}
100%{
background:#120022;
}
}

.ssr-effect{
animation:goldFlash 0.8s ease;
}

@keyframes slotGlow{
0%{
transform:scale(1);
}
100%{
transform:scale(1.08);
}
}

0%{transform:translateX(0);}
25%{transform:translateX(-6px);}
50%{transform:translateX(6px);}
75%{transform:translateX(-6px);}
100%{transform:translateX(0);}

}
</style>
</head>

<body>

<div class="app">

<div class="topbar">

<button class="back" onclick="location.href='index.html'">
← ホーム
</button>

<div class="gems">
💎 12,345
</div>

</div>

<div class="title">
NEON<br>
GACHA
</div>

<div class="subtitle">
SSR確率 3%
</div>

<div class="diamond-box">
💎 <span id="diamondCount">500</span>
</div>

<div class="machine">

<div class="core"></div>

<div class="flash" id="flash"></div>

</div>

<button class="gacha-btn"
onclick="pullGacha()">

🎰 ガチャを引く

</button>
<button class="gacha-btn ten-btn"
onclick="pull10Gacha()">

🔥 10連ガチャ

</button>

<div id="slotArea">

<div class="slot" id="slot1">?</div>
<div class="slot" id="slot2">?</div>
<div class="slot" id="slot3">?</div>

</div>

<div id="tenResult"></div>

<div class="result" id="result">

<div class="result-rank">
READY
</div>

<div class="result-name">
超レアを狙え🔥
</div>

</div>

</div>

<div class="bottom-nav">

<div class="nav-btn" onclick="location.href='index.html'">
<div>🏠</div>
ホーム
</div>

<div class="nav-btn" onclick="location.href='game.html'">
<div>🎮</div>
プレイ
</div>

<div class="nav-btn" onclick="location.href='gacha.html'">
<div>🎰</div>
ガチャ
</div>

<div class="nav-btn">
<div>🏆</div>
ランク
</div>

</div>

<script>

let diamonds = 500;

const characters = {

R: [
{name:"黒猫", img:"blackcat.png.jpg"},
{name:"白猫", img:"whitecat.png.jpg"},
{name:"騎士", img:"knight.png.jpg"},
{name:"忍者", img:"ninja.png.jpg"},
{name:"魔法使い", img:"mage.png.jpg"}
],

SR: [
{name:"天使", img:"angel.png.jpg"},
{name:"アーサー", img:"arthur.png.jpg"},
{name:"悪魔", img:"devil.png.jpg"}
],

SSR: [
{name:"神龍", img:"goddragon.png.jpg"},
{name:"白龍", img:"whitedragon.png.jpg"}
]

};

function pull10Gacha(){

if(diamonds < 500){

alert("ダイヤが足りない！");

return;

}

diamonds -= 500;

document.getElementById("diamondCount").innerHTML = diamonds;

const tenResult =
document.getElementById("tenResult");

tenResult.innerHTML = "";

for(let i = 0; i < 10; i++){

const rand = Math.random();

let rank = "R";

if(rand < 0.03){
rank = "SSR";
}
else if(rand < 0.20){
rank = "SR";
}

const list = characters[rank];

const chara =
list[Math.floor(Math.random() * list.length)];

tenResult.innerHTML += `
<div class="slot opening show${i+1}{rank.toLowerCase()} ${rank === 'SSR' ? 'ssr-effect' : ''}">
<img src="${chara.img}">
</div>
`;

}

}

function pullGacha(){

if(diamonds < 50){

alert("ダイヤが足りない！");

return;

}

diamonds -= 50;

document.getElementById("diamondCount").innerHTML = diamonds;

const flash = document.getElementById("flash");
const result = document.getElementById("result");

document.body.style.animation = "";
document.body.style.background = "#000";

result.style.animation = "";

flash.classList.add("active");

setTimeout(()=>{
flash.classList.remove("active");
},500);

const slot1 = document.getElementById("slot1");
const slot2 = document.getElementById("slot2");
const slot3 = document.getElementById("slot3");

const marks = ["7","★","◆","⚡","👑"];

const resultRank =
document.querySelector(".result-rank");

const resultName =
document.querySelector(".result-name");

let spin = setInterval(()=>{

slot1.innerHTML =
marks[Math.floor(Math.random()*marks.length)];

slot2.innerHTML =
marks[Math.floor(Math.random()*marks.length)];

slot3.innerHTML =
marks[Math.floor(Math.random()*marks.length)];

},100);

setTimeout(()=>{

clearInterval(spin);

const rand = Math.random();

if(rand < 0.03){

slot1.innerHTML = "SSR";
slot2.innerHTML = "SSR";
slot3.innerHTML = "SSR";

document.body.style.animation =
"rainbowFlash 1s infinite";

result.style.animation =
"shake 0.4s infinite";

resultRank.innerHTML = "✨ SSR ✨";
resultName.innerHTML = "NEON DRAGON";

}
else if(rand < 0.50){

slot1.innerHTML = "SR";
slot2.innerHTML = "SR";
slot3.innerHTML = "SR";

document.body.style.background =
"linear-gradient(#3a0000,#ff0000)";

result.style.animation =
"shake 0.5s infinite";

resultRank.innerHTML = "⚡ SR ⚡";
resultName.innerHTML = "CYBER PHOENIX";

}
else{

slot1.innerHTML = "R";
slot2.innerHTML = "R";
slot3.innerHTML = "R";

document.body.style.background =
"#000";

result.style.animation = "";

resultRank.innerHTML = "◆ R ◆";
resultName.innerHTML = "PULSE UNIT";

}

},1500);

}
</script>
